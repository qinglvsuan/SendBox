name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with 'v', e.g., v1.0.0

jobs:
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            flutter_target: windows-x64
            rust_target: x86_64-pc-windows-msvc
            out_dir: build\windows\x64\runner\Release
          - arch: arm64
            flutter_target: windows-arm64
            rust_target: aarch64-pc-windows-msvc
            out_dir: build\windows\arm64\runner\Release
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y flutter_rust_bridge_codegen

      - name: Generate FRB Code
        run: flutter_rust_bridge_codegen generate

      - name: Apply Launcher Icons
        run: dart run flutter_launcher_icons
        
      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop
        
      - name: Build Windows Executable (${{ matrix.arch }})
        run: flutter build windows --target-platform ${{ matrix.flutter_target }}
        
      - name: Compress Windows Release (${{ matrix.arch }})
        run: Compress-Archive -Path ${{ matrix.out_dir }}\* -DestinationPath SendBox-Windows-${{ matrix.arch }}.zip

      - name: Archive Windows Release (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact-${{ matrix.arch }}
          path: SendBox-Windows-${{ matrix.arch }}.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y flutter_rust_bridge_codegen

      - name: Generate FRB Code
        run: flutter_rust_bridge_codegen generate

      - name: Apply Launcher Icons
        run: dart run flutter_launcher_icons
        
      - name: Build APKs
        run: flutter build apk --split-per-abi
        
      - name: Rename APKs
        run: |
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk SendBox-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk SendBox-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk SendBox-x86_64.apk

      - name: Archive Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: SendBox-*.apk

  release:
    name: Create GitHub Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows x64 Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact-x64
          path: windows-release

      - name: Download Windows arm64 Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact-arm64
          path: windows-release
          
      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts
          path: android-release
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-release/SendBox-Windows-x64.zip
            windows-release/SendBox-Windows-arm64.zip
            android-release/SendBox-armeabi-v7a.apk
            android-release/SendBox-arm64-v8a.apk
            android-release/SendBox-x86_64.apk
